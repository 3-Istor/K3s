apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qcm
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
      jqPathExpressions:
        - .spec.replicas
  project: default
  source:
    repoURL: https://github.com/3-Istor/K3s.git
    targetRevision: HEAD
    path: k8s/config/qcm
  destination:
    name: in-cluster
    namespace: qcm
