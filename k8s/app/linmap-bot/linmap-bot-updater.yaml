apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: linmap-bot-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "linmap-bot"
      images:
        - alias: "linmap-bot"
          imageName: "ghcr.io/thegostsniperfr/linmap-bot"

          manifestTargets:
            helm:
              name: "image.repository"
              tag: "image.tag"

          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^sha-[a-f0-9]+$"
      writeBackConfig:
        method: "git:secret:argocd/git-creds"
        gitConfig:
          branch: "main"
          writeBackTarget: "helmvalues:/k8s/config/linmap-bot/linmap-bot-values.yaml"
          pullRequest:
            github: {}
