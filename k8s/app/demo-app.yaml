apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
    # argocd-image-updater.argoproj.io/image-list: demo=ghcr.io/thegostsniperfr/kube-classes
    # argocd-image-updater.argoproj.io/demo.update-strategy: digest
    # argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
  project: default
  source:
    repoURL: https://github.com/3-Istor/K3s.git
    targetRevision: HEAD
    path: k8s/config/demo-app
  destination:
    name: in-cluster
    namespace: demo-app
