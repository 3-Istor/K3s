apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnp-projects-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/3-Istor/cnp-projects.git
    targetRevision: HEAD
    path: projects
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - AllowEmpty=true
