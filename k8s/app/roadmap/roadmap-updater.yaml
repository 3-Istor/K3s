apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: roadmap-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "roadmap"
      images:
        - alias: "roadmap"
          imageName: "ghcr.io/3-istor/roadmap"

          helm:
            imageName: "image.repository"
            imageTag: "image.tag"

          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^sha-[a-f0-9]+$"

      writeBackConfig:
        method: "git:secret:argocd/git-creds"
        gitConfig:
          branch: "main"
          writeBackTarget: "helmvalues:/k8s/config/roadmap/roadmap-values.yaml"
          pullRequest:
            github: {}
