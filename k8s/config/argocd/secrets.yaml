apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: argocd-secret
  labels:
    app.kubernetes.io/name: argocd-secret
    app.kubernetes.io/part-of: argocd
  namespace: argocd
spec:
  path: kvv2/argocd/oidc
  type: Opaque
  reconcileStrategy: Merge
  keys:
    - oidc.keycloak.clientSecret
---
apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: argocd-ghcr-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
spec:
  path: kvv2/argocd/ghcr-repo
  vaultRole: argocd-role
  type: Opaque
  keys:
    - type
    - name
    - url
    - enableOci
    - username
    - password
