# ---------------------------------------------------------
# Environment variables (Vault secret injection)
# ---------------------------------------------------------
envFrom:
  - secretRef:
      name: status-secrets

# ---------------------------------------------------------
# Gatus main configuration
# ---------------------------------------------------------
config:
  # Alerting configuration
  alerting:
    discord:
      # The environment variable is injected by status-secrets above
      webhook-url: "${DISCORD_WEBHOOK_URL}"

  # List of services to monitor
  endpoints:
    # ==========================================
    # 1. PHYSICAL INFRASTRUCTURE & NETWORK
    # ==========================================
    - name: PAE Node 1
      group: 1. Physical Infrastructure
      # Inferred from your SSH config (K3s Main API Server host)
      # Update this IP if PAE Node 1 is hosted on a different local IP
      url: "icmp://192.168.1.110"
      interval: 1m
      conditions:
        - "[CONNECTED] == true"
      alerts:
        - type: discord
          failure-threshold: 3
          success-threshold: 2
          description: "🔴 PAE Node 1 is not responding to ping."

    - name: PAE Node 2
      group: 1. Physical Infrastructure
      url: "icmp://192.168.1.81"
      interval: 1m
      conditions:
        - "[CONNECTED] == true"
      alerts:
        - type: discord
          failure-threshold: 3
          success-threshold: 2
          description: "🔴 PAE Node 2 (Runner Host) is not responding to ping."

    - name: PAE Node 3
      group: 1. Physical Infrastructure
      url: "icmp://192.168.1.47"
      interval: 1m
      conditions:
        - "[CONNECTED] == true"
      alerts:
        - type: discord
          failure-threshold: 3
          success-threshold: 2
          description: "🔴 PAE Node 3 is not responding to ping."

    - name: OpenStack Control Plane (VIP)
      group: 1. Physical Infrastructure
      url: "icmp://192.168.1.210"
      interval: 1m
      conditions:
        - "[CONNECTED] == true"
      alerts:
        - type: discord
          failure-threshold: 3
          success-threshold: 2
          description: "🔴 OpenStack Virtual IP (192.168.1.210) is not responding to ping."

    # AWS VPN commented out in case ping routing issues persist.
    - name: VPN Tunnel (AWS)
      group: 1. Physical Infrastructure
      url: "icmp://10.0.0.101"
      interval: 1m
      conditions:
        - "[CONNECTED] == true"
      alerts:
        - type: discord
          failure-threshold: 3

    # ==========================================
    # 2. KUBERNETES CORE SERVICES (Public)
    # ==========================================
    - name: Keycloak (Auth)
      group: 2. Core Services
      url: "https://auth.3istor.com/health/ready"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    - name: ArgoCD (GitOps)
      group: 2. Core Services
      url: "https://argocd.3istor.com"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    - name: Vault (Secrets)
      group: 2. Core Services
      url: "https://vault.3istor.com/v1/sys/health"
      interval: 1m
      conditions:
        # Vault returns 200 (Active) or 429/473 (Standby/Unsealed). All are healthy states.
        - "[STATUS] == 200 || [STATUS] == 429 || [STATUS] == 473"
      alerts:
        - type: discord
          failure-threshold: 3

    - name: Garage S3 (Storage)
      group: 2. Core Services
      url: "https://s3.3istor.com"
      interval: 1m
      conditions:
        # S3 API returns 403 Forbidden at root without credentials, confirming the API is up.
        - "[STATUS] == 403 || [STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    # ==========================================
    # 3. LOB APPLICATIONS (Public)
    # ==========================================
    - name: N8N (Automation)
      group: 3. Applications
      url: "http://offhours-guard.offhours-guard.svc.cluster.local:8082/health/n8n/n8n?port=5678"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    - name: QCM App
      group: 3. Applications
      url: "http://offhours-guard.offhours-guard.svc.cluster.local:8082/health/qcm/qcm?port=3000"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    # ==========================================
    # 4. SECURED APPLICATIONS (Internal Verification)
    # Bypasses Envoy & Keycloak using cluster-internal Kubernetes Services (.svc.cluster.local)
    # ==========================================
    - name: ARCL CMP (Frontend)
      group: 4. Internal Applications (Direct)
      url: "http://offhours-guard.offhours-guard.svc.cluster.local:8082/health/arcl-cmp/arcl-cmp-frontend?port=3000"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    - name: ARCL CMP (Backend API)
      group: 4. Internal Applications (Direct)
      url: "http://offhours-guard.offhours-guard.svc.cluster.local:8082/health/arcl-cmp/arcl-cmp-backend?port=8000"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    - name: Roadmap
      group: 4. Internal Applications (Direct)
      url: "http://offhours-guard.offhours-guard.svc.cluster.local:8082/health/roadmap/roadmap?port=3000"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    - name: Mepa AI
      group: 4. Internal Applications (Direct)
      url: "http://offhours-guard.offhours-guard.svc.cluster.local:8082/health/mepa-app/mepa"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3

    - name: Demo App
      group: 4. Internal Applications (Direct)
      url: "http://kube-classes-svc.demo-app.svc.cluster.local:80"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: discord
          failure-threshold: 3
