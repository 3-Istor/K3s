apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-http-route
  namespace: keycloak
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-infra
  hostnames:
    - "auth.3istor.com"
    - "admin-auth.3istor.com"
  rules:
    - matches:
        - path:
            type: Exact
            value: "/"
          headers:
            - type: Exact
              name: "Host"
              value: "auth.3istor.com"
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 302
            path:
              type: ReplaceFullPath
              replaceFullPath: "/realms/3istor/account/"
    - backendRefs:
        - name: keycloakx-http
          port: 80
