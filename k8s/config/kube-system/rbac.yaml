# ---------------------------------------------------------
# 1. ADMINS: Full Access (Cluster Admin)
# ---------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: Group
    name: "oidc:k3s-admin"

---
# ---------------------------------------------------------
# 2. VIEWERS + DEVS: Read-only across the entire cluster
# ---------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-view-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: Group
    name: "oidc:k3s-view"
  - kind: Group
    name: "oidc:k3s-dev"
