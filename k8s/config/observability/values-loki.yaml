loki:
  auth_enabled: true # Enable Multi-Tenancy

  commonConfig:
    replication_factor: 1

  storage:
    type: s3
    bucketNames:
      chunks: "loki-data"
      ruler: "loki-data"
      admin: "loki-data"
    s3:
      endpoint: "s3.3istor.com"
      region: "eu-west-3"
      accessKeyId: "${S3_ACCESS_KEY}"
      secretAccessKey: "${S3_SECRET_KEY}"
      s3ForcePathStyle: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    storageClass: "ceph-block"
    size: 5Gi

  extraEnvFrom:
    - secretRef:
        name: observability-secrets
