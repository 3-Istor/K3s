vmstorage:
  replicaCount: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "50m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  storageDataPath: "/storage"
  persistentVolume:
    enabled: true
    storageClassName: "ceph-block"
    size: "10Gi"

vminsert:
  replicaCount: 1
  resources:
    limits:
      memory: "256Mi"
      cpu: "200m"

vmselect:
  replicaCount: 1
  resources:
    limits:
      memory: "256Mi"
      cpu: "200m"

# VMAuth acts as the multi-tenant router
vmauth:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      memory: "128Mi"
      cpu: "100m"

  config:
    unauthorized_user:
      url_map:
        - src_paths:
            - "/select/[^/]+/prometheus(.*)"
          url_prefix:
            - "http://vm-victoria-metrics-cluster-vmselect:8481/select/0/prometheus$1"

        - src_paths:
            - "/insert/[^/]+/prometheus/api/v1/write"
          url_prefix:
            - "http://vm-victoria-metrics-cluster-vminsert:8480/insert/0/prometheus/api/v1/write"

vmalertmanager:
  enabled: true
  replicaCount: 1

  extraVolumes:
    - name: secrets-volume
      secret:
        secretName: observability-secrets
  extraVolumeMounts:
    - name: secrets-volume
      mountPath: /etc/secrets
      readOnly: true

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "job", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "discord-default"
      routes:
        - receiver: "discord-critical"
          matchers:
            - severity="critical"
          continue: false
    receivers:
      - name: "discord-default"
        discord_configs:
          - webhook_url_file: /etc/secrets/DISCORD_WEBHOOK_URL
            send_resolved: true
            title: '{{ template "discord.title" . }}'
            message: '{{ template "discord.message" . }}'
      - name: "discord-critical"
        discord_configs:
          - webhook_url_file: /etc/secrets/DISCORD_WEBHOOK_URL
            send_resolved: true
            title: "🔥 Critical Alert System"
            message: '{{ template "discord.message" . }}'

  templates:
    discord.tmpl: |-
      {{ define "discord.title" }}
      {{ if eq .Status "firing" }}
        {{ if eq .CommonLabels.severity "critical" }}🛑 [CRITICAL]{{ else if eq .CommonLabels.severity "warning" }}⚠️ [WARNING]{{ else }}ℹ️ [INFO]{{ end }}
      {{ else }}
        ✅ [RESOLVED]
      {{ end }}
      {{ .GroupLabels.alertname }}
      {{ end }}

      {{ define "discord.message" }}
      {{ range .Alerts }}
      **Alert:** {{ .Annotations.summary }}
      **Description:** {{ .Annotations.description }}
      **Severity:** `{{ .Labels.severity }}`
      **Namespace:** `{{ .Labels.namespace }}`
      **Pod:** `{{ .Labels.pod }}`
      --------------------------------
      {{ end }}
      {{ end }}

vmalert:
  enabled: true
  replicaCount: 1

  notifier:
    config:
      alertmanager:
        url: "http://vm-victoria-metrics-cluster-vmalertmanager.observability.svc:9093"

  configMap: "vmalert-rules"
