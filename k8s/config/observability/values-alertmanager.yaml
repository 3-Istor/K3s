replicaCount: 1

extraVolumes:
  - name: secrets-volume
    secret:
      secretName: observability-secrets
extraVolumeMounts:
  - name: secrets-volume
    mountPath: /etc/secrets
    readOnly: true

config:
  global:
    resolve_timeout: 5m
  route:
    group_by: ["alertname", "job", "namespace"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
    receiver: "discord-default"
    routes:
      - receiver: "discord-critical"
        matchers:
          - severity="critical"
        continue: false
  receivers:
    - name: "discord-default"
      discord_configs:
        - webhook_url_file: /etc/secrets/DISCORD_WEBHOOK_URL
          send_resolved: true
    - name: "discord-critical"
      discord_configs:
        - webhook_url_file: /etc/secrets/DISCORD_WEBHOOK_URL
          send_resolved: true
