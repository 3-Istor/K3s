replicaCount: 1

extraVolumes:
  - name: secrets-volume
    secret:
      secretName: observability-secrets
extraVolumeMounts:
  - name: secrets-volume
    mountPath: /etc/secrets
    readOnly: true

config:
  global:
    resolve_timeout: 5m
  route:
    group_by: ["alertname", "job", "namespace"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
    receiver: "discord-default"
    routes:
      - receiver: "discord-critical"
        matchers:
          - severity="critical"
        continue: false
  receivers:
    - name: "discord-default"
      discord_configs:
        - webhook_url_file: /etc/secrets/DISCORD_WEBHOOK_URL
          send_resolved: true
          title: '{{ template "discord.title" . }}'
          message: '{{ template "discord.message" . }}'
    - name: "discord-critical"
      discord_configs:
        - webhook_url_file: /etc/secrets/DISCORD_WEBHOOK_URL
          send_resolved: true
          title: "🔥 Critical Alert System"
          message: '{{ template "discord.message" . }}'

templates:
  discord.tmpl: |-
    {{ define "discord.title" }}
    {{ if eq .Status "firing" }}
      {{ if eq .CommonLabels.severity "critical" }}🛑 [CRITICAL]{{ else if eq .CommonLabels.severity "warning" }}⚠️ [WARNING]{{ else }}ℹ️ [INFO]{{ end }}
    {{ else }}
      ✅ [RESOLVED]
    {{ end }}
    {{ .GroupLabels.alertname }}
    {{ end }}

    {{ define "discord.message" }}
    {{ range .Alerts }}
    **Alert:** {{ .Annotations.summary }}
    **Description:** {{ .Annotations.description }}
    **Severity:** `{{ .Labels.severity }}`
    {{- if .Labels.namespace }}
    **Namespace:** `{{ .Labels.namespace }}`
    {{- end }}
    {{- if .Labels.pod }}
    **Pod:** `{{ .Labels.pod }}`
    {{- end }}
    --------------------------------
    {{ end }}
    {{ end }}
