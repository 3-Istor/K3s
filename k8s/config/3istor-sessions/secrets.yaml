apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: 3istor-sessions-secrets
  namespace: 3istor-sessions
spec:
  path: kvv2/3istor-sessions/config
  vaultRole: 3istor-sessions-role
  type: Opaque
  keys:
    - DATABASE_URL
    - DATABASE_PASSWORD
    - APP_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - TEAM_MEMBERS
    - MANAGER_EMAIL
    - GOOGLE_AVAILABILITY_CALENDAR_IDS
