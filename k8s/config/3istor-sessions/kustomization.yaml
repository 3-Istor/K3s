apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: 3istor-sessions

resources:
  - namespace.yaml
  - postgres.yaml
  - secrets.yaml
  - offhours-guard.yaml
  - 3istor-sessions-updater.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: 3istor-sessions
    repo: oci://ghcr.io/3-istor/charts
    version: 0.1.0
    releaseName: 3istor-sessions
    namespace: 3istor-sessions
    valuesFile: 3istor-sessions-values.yaml

  - name: secure-route
    releaseName: 3istor-sessions-routes
    namespace: 3istor-sessions
    valuesFile: values-secure-route.yaml
