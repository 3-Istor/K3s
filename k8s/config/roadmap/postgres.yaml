apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roadmap-postgres-pvc
  namespace: roadmap
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: roadmap-postgres
  namespace: roadmap
spec:
  selector:
    app: roadmap-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roadmap-postgres
  namespace: roadmap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roadmap-postgres
  template:
    metadata:
      labels:
        app: roadmap-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: "roadmap"
            - name: POSTGRES_USER
              value: "roadmap"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: roadmap-secrets
                  key: database-url
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres-data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: roadmap-postgres-pvc
