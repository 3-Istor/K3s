apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-app

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - secrets.yaml

helmCharts:
  - name: secure-route
    repo: ../../../charts
    version: 0.1.0
    releaseName: demo-routes
    namespace: demo-app
    valuesFile: values-secure-route.yaml
