apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: garage-s3-route
  namespace: garage-s3
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-infra
  hostnames:
    - "s3.3istor.com"
    - "avatars-s3.3istor.com"
  rules:
    - backendRefs:
        - name: garage
          port: 3900
