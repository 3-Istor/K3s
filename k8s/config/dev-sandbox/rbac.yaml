# ---------------------------------------------------------
# DEVS: Write/edit permissions in their own namespace
# ---------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc-dev-sandbox-binding
  namespace: dev-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: Group
    name: "oidc:k3s-dev"
