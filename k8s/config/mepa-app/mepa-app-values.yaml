fullnameOverride: "mepa"
replicaCount: 1
image:
  repository: ghcr.io/3-istor/mepa
  tag: "sha-7f975bd"
  pullPolicy: Always
ingress:
  enabled: false
autoscaling:
  enabled: false
persistence:
  enabled: true
  storageClass: "local-path"
  size: "1Gi"
  mountPath: "/app/data"
env:
  AI_PROVIDER: "gemini"
  GEMINI_MODEL: "gemini-2.5-flash-lite"
  PROMPT_ATTEMPT_LIMIT: "5"
  TRUST_PROXY: "true"
  SESSION_COOKIE_SECURE: "true"
  FLASK_DEBUG: "false"
  DATABASE_PATH: "/app/data/mepa.sqlite"
  LOCAL_VIDEO_PATH: "/app/video-introduction-ia.mp4"
  HOST: "0.0.0.0"
  PORT: "8000"
secrets:
  create: false
extraEnv:
- name: SECRET_KEY
  valueFrom:
    secretKeyRef:
      name: mepa-app-secrets
      key: FLASK_SECRET_KEY
- name: GEMINI_API_KEY
  valueFrom:
    secretKeyRef:
      name: mepa-app-secrets
      key: GEMINI_API_KEY
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 512Mi
