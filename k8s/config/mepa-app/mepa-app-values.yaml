fullnameOverride: "mepa"
replicaCount: 1
image:
  repository: ghcr.io/3-istor/mepa
  tag: "sha-2ee686c"
  pullPolicy: Always

ingress:
  enabled: false

autoscaling:
  enabled: false

persistence:
  enabled: true
  storageClass: "local-path"
  size: "2Gi"
  mountPath: "/app/data"

env:
  - name: GEMINI_MODEL
    value: "gemini-2.5-flash-lite"
  - name: PROMPT_ATTEMPT_LIMIT
    value: "5"
  - name: TRUST_PROXY
    value: "true"
  - name: SESSION_COOKIE_SECURE
    value: "true"
  - name: FLASK_DEBUG
    value: "false"
  - name: DATABASE_PATH
    value: "/app/data/mepa.sqlite"
  - name: LOCAL_VIDEO_PATH
    value: "/app/video-introduction-ia.mp4"
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "8000"
  - name: GEMINI_API_KEY
    valueFrom:
      secretKeyRef:
        name: mepa-app-secrets
        key: GEMINI_API_KEY
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: mepa-app-secrets
        key: FLASK_SECRET_KEY
