apiVersion: v1
kind: ServiceAccount
metadata:
  name: cmp-backend-sa
  namespace: arcl-cmp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cmp-terraform-runner-role
rules:
  - apiGroups: [""]
    resources: ["namespaces", "secrets"]
    verbs: ["*"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects"]
    verbs: ["*"]
  - apiGroups: ["argocd-image-updater.argoproj.io"]
    resources: ["imageupdaters"]
    verbs: ["*"]
  - apiGroups: ["ricoberger.de"]
    resources: ["vaultsecrets"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cmp-terraform-runner-binding
subjects:
  - kind: ServiceAccount
    name: cmp-backend-sa
    namespace: arcl-cmp
roleRef:
  kind: ClusterRole
  name: cmp-terraform-runner-role
  apiGroup: rbac.authorization.k8s.io
