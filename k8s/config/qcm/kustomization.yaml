apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: qcm

resources:
  - namespace.yaml
  - postgres.yaml
  - secrets.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: qcm
    repo: oci://ghcr.io/3-istor/charts
    version: 1.0.1
    releaseName: qcm
    namespace: qcm
    valuesFile: values.yaml

  - name: secure-route
    releaseName: qcm-routes
    namespace: qcm
    valuesFile: values-secure-route.yaml
