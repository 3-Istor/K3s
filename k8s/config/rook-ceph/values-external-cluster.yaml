# This configures the CSI drivers to point to the external OpenStack Ceph
toolbox:
  enabled: false

cephClusterSpec:
  external:
    enable: true

  # wget https://raw.githubusercontent.com/rook/rook/master/deploy/examples/create-external-cluster-resources.py

  # sudo cephadm shell   -v /home/pae-node-1:/mnt \
  #   -- python3 /mnt/create-external-cluster-resources.py \
  #   --namespace rook-ceph   --rbd-data-pool-name volumes \
  #   --format bash > external-cluster-details.sh

  dataDirHostPath: /var/lib/rook

cephBlockPools:
  - name: replicapool
    spec:
      # Matches the RBD_POOL_NAME (volumes)
      failureDomain: host
      replicated:
        size: 1
    storageClass:
      enabled: true
      name: ceph-block
      isDefault: true
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      parameters:
        pool: "volumes" # Mapped to the RBD_POOL_NAME
        imageFormat: "2"
        imageFeatures: layering
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
        csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
        csi.storage.k8s.io/fstype: ext4
