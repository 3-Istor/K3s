apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rook-ceph

resources:
  - namespace.yaml
  - secrets.yaml
  - configmaps.yaml
  - storageclass.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: rook-ceph
    repo: https://charts.rook.io/release
    version: 1.20.1
    releaseName: rook-ceph
    namespace: rook-ceph
    includeCRDs: true

  - name: ceph-csi-drivers
    repo: https://charts.rook.io/release
    version: 1.20.1
    releaseName: ceph-csi-drivers
    namespace: rook-ceph
    valuesFile: csi-drivers-values.yaml

  - name: rook-ceph-cluster
    repo: https://charts.rook.io/release
    version: 1.20.1
    releaseName: rook-ceph-external
    namespace: rook-ceph
    valuesFile: values-external-cluster.yaml
